server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Proxy API requests to backend service
    location /api/ {
        proxy_pass http://api:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        # Overwrite (do NOT append) X-Forwarded-For with the real connecting
        # address. Using $proxy_add_x_forwarded_for would preserve any
        # client-supplied X-Forwarded-For, and since uvicorn trusts this hop
        # (--forwarded-allow-ips) it would then log the client-spoofed value as
        # the source IP. nginx is the edge proxy here, so $remote_addr is the
        # real client; replacing the header strips spoofed entries. If another
        # proxy/LB is ever placed in front of nginx, switch to the realip
        # module to derive the true client before this line.
        proxy_set_header X-Forwarded-For $remote_addr;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # SPA fallback: serve index.html for any non-file route
    location / {
        try_files $uri $uri/ /index.html;
    }
}
