name: Actions Pin Lint

# Enforces §4.9: every GitHub Action `uses:` must be pinned to a full commit
# SHA. Self-contained check (scripts/check_action_pins.py) — no third-party
# linter to vet or pin in turn.
on:
  pull_request:
    paths:
      - ".github/workflows/**"
      - "scripts/check_action_pins.py"
  push:
    branches:
      - main
    paths:
      - ".github/workflows/**"

permissions:
  contents: read

jobs:
  pin-lint:
    name: Verify Actions are SHA-pinned
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Check action pins
        run: python3 scripts/check_action_pins.py
