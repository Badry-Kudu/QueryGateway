name: Docker Build

on:
  pull_request:
    paths:
      - "backend/**"
      - "frontend/**"
      - "docker/**"
      - "docker-compose.yml"
      - ".github/workflows/docker.yml"
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  build:
    name: Build Docker Images
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3.12.0

      - name: Build backend image
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6.19.2
        with:
          context: .
          file: docker/Dockerfile.backend
          push: false
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build frontend image
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6.19.2
        with:
          context: .
          file: docker/Dockerfile.frontend
          push: false
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Create .env for compose validation
        run: |
          echo "JWT_SECRET_KEY=ci-placeholder-not-used-at-runtime" > .env
          echo "ENCRYPTION_KEY=ci-placeholder-not-used-at-runtime" >> .env
          echo "ADMIN_USERNAME=ci-placeholder" >> .env
          echo "ADMIN_PASSWORD_HASH=ci-placeholder-not-used-at-runtime" >> .env

      - name: Validate docker-compose config
        run: docker compose config --quiet
