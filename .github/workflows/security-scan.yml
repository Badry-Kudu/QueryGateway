name: Scheduled Security Scan

# §4.9 currency: re-scan on a schedule so dormant branches are re-checked
# against newly published advisories, not only when code changes. Also
# runnable on demand.
on:
  schedule:
    - cron: "27 6 * * 1" # Mondays 06:27 UTC (off-peak minute)
  workflow_dispatch:

permissions:
  contents: read

jobs:
  python-audit:
    name: pip-audit (backend)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Set up Python 3.14
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.14"
      - name: Audit pinned dependencies
        working-directory: backend
        run: |
          # Auditor installed hash-pinned so the scan job itself is locked (§4.9).
          pip install --require-hashes -r requirements-audit.lock
          pip-audit --require-hashes -r requirements.lock

  npm-audit:
    name: npm audit (frontend)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Set up Node.js LTS
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "24"
      - name: Audit dependencies
        working-directory: frontend
        run: npm audit --audit-level=high

  osv-scanner:
    name: osv-scanner (whole tree)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Scan lockfiles against the OSV database
        uses: google/osv-scanner-action/osv-scanner-action@9a498708959aeaef5ef730655706c5a1df1edbc2 # v2.3.8
        with:
          scan-args: |-
            --recursive
            --skip-git
            ./
