name: Scheduled Security Scan

# §4.9 currency: re-scan on a schedule so dormant branches are re-checked
# against newly published advisories, not only when code changes. Also
# runnable on demand.
on:
  schedule:
    - cron: "27 6 * * 1" # Mondays 06:27 UTC (off-peak minute)
  workflow_dispatch:

permissions:
  contents: read

jobs:
  python-audit:
    name: pip-audit (backend)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - name: Set up Python 3.14
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: "3.14"
      - name: Audit pinned dependencies
        working-directory: backend
        run: |
          pip install pip-audit==2.9.0
          pip-audit --require-hashes -r requirements.lock

  npm-audit:
    name: npm audit (frontend)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - name: Set up Node.js LTS
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: "20"
      - name: Audit dependencies
        working-directory: frontend
        run: npm audit --audit-level=high

  osv-scanner:
    name: osv-scanner (whole tree)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - name: Scan lockfiles against the OSV database
        uses: google/osv-scanner-action/osv-scanner-action@9a498708959aeaef5ef730655706c5a1df1edbc2 # v2.3.8
        with:
          scan-args: |-
            --recursive
            --skip-git
            ./
