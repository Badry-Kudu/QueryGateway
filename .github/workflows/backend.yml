name: Backend CI

on:
  pull_request:
    paths:
      - "backend/**"
      - ".github/workflows/backend.yml"
  push:
    branches:
      - main
    paths:
      - "backend/**"

permissions:
  contents: read

jobs:
  lint-and-test:
    name: Lint, Type-check & Test
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: db2api_test
          POSTGRES_USER: db2api
          POSTGRES_PASSWORD: db2api
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U db2api -d db2api_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        working-directory: backend
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Lint (ruff)
        working-directory: backend
        run: ruff check .

      - name: Type-check (mypy)
        working-directory: backend
        run: mypy .

      - name: Test (pytest)
        working-directory: backend
        env:
          DATABASE_URL: postgresql+asyncpg://db2api:db2api@localhost:5432/db2api_test
          JWT_SECRET_KEY: test-secret-key-do-not-use-in-production
          APP_ENV: test
          # Test-only admin credentials. Plaintext is
          # "admin-password-do-not-use-in-prod"; the hash here is bcrypt.
          # Production deployments MUST set their own ADMIN_PASSWORD_HASH.
          ADMIN_USERNAME: admin
          ADMIN_PASSWORD_HASH: $2b$12$YzgLtLngpsgS39BQBSK0We/dWJoG7/pGiGpHrYMAB.ffcru5FC84q
        run: pytest
