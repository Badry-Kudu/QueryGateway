name: Backend CI

on:
  pull_request:
    paths:
      - "backend/**"
      - ".github/workflows/backend.yml"
  push:
    branches:
      - main
    paths:
      - "backend/**"

permissions:
  contents: read

jobs:
  lint-and-test:
    name: Lint, Type-check & Test
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: db2api_test
          POSTGRES_USER: db2api
          POSTGRES_PASSWORD: db2api
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U db2api -d db2api_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          persist-credentials: false

      - name: Set up Python 3.14
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: "3.14"
          cache: pip
          cache-dependency-path: backend/requirements.lock

      - name: Install dependencies (hash-pinned)
        working-directory: backend
        run: |
          python -m pip install --upgrade pip
          # --require-hashes refuses to install anything whose artifact hash is
          # not pinned in the lockfile (fails the build on a tampered/substituted
          # package). requirements.lock is generated from requirements.txt via
          # `uv pip compile --generate-hashes` (§4.9).
          pip install --require-hashes -r requirements.lock

      - name: Audit dependencies (pip-audit)
        working-directory: backend
        run: |
          # Build-failing vulnerability gate (§4.9). The auditor itself is
          # installed from a hash-pinned lockfile so the scanner job does not
          # bypass the supply-chain guardrail. pip-audit exits non-zero on any
          # known advisory in the audited lockfile.
          pip install --require-hashes -r requirements-audit.lock
          pip-audit --require-hashes -r requirements.lock

      - name: Lint (ruff)
        working-directory: backend
        run: ruff check .

      - name: Type-check (mypy)
        working-directory: backend
        run: mypy .

      - name: Test (pytest)
        working-directory: backend
        env:
          DATABASE_URL: postgresql+asyncpg://db2api:db2api@localhost:5432/db2api_test
          JWT_SECRET_KEY: test-secret-key-do-not-use-in-production
          APP_ENV: test
          # Test-only admin credentials. Plaintext is
          # "admin-password-do-not-use-in-prod"; the hash here is bcrypt.
          # Production deployments MUST set their own ADMIN_PASSWORD_HASH.
          ADMIN_USERNAME: admin
          ADMIN_PASSWORD_HASH: $2b$12$YzgLtLngpsgS39BQBSK0We/dWJoG7/pGiGpHrYMAB.ffcru5FC84q
        run: pytest
