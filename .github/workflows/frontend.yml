name: Frontend CI

on:
  pull_request:
    paths:
      - "frontend/**"
      - ".github/workflows/frontend.yml"
  push:
    branches:
      - main
    paths:
      - "frontend/**"

permissions:
  contents: read

jobs:
  lint-and-test:
    name: Lint, Format-check & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Set up Node.js LTS
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies (no lifecycle scripts)
        working-directory: frontend
        # --ignore-scripts blocks pre/post-install lifecycle scripts, a common
        # supply-chain code-execution vector (§4.6). The build is verified to
        # succeed without them.
        run: npm ci --ignore-scripts

      - name: Audit dependencies (npm audit)
        working-directory: frontend
        # Build-failing vulnerability gate: non-zero exit on any high or
        # critical advisory (§4.9).
        run: npm audit --audit-level=high

      - name: Lint (ESLint)
        working-directory: frontend
        run: npm run eslint

      - name: Format check (Prettier)
        working-directory: frontend
        run: npm run prettier:check

      - name: Test (Vitest)
        working-directory: frontend
        run: npm run test

      - name: Build
        working-directory: frontend
        run: npm run build
