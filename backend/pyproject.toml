[tool.ruff]
target-version = "py314"
line-length = 100
src = ["app", "tests"]

[tool.ruff.lint]
select = [
    "E",   # pycodestyle errors
    "W",   # pycodestyle warnings
    "F",   # pyflakes
    "I",   # isort
    "B",   # flake8-bugbear
    "C4",  # flake8-comprehensions
    "UP",  # pyupgrade
    "S",   # flake8-bandit (security)
    "T20", # flake8-print
]
ignore = [
    "S101", # assert allowed in tests
    "S105", # possible hardcoded password - too noisy for config files
]

[tool.ruff.lint.per-file-ignores]
"tests/**" = ["S", "T20"]
# B008: Depends() in default args is the canonical FastAPI DI pattern.
"app/routers/**" = ["B008"]

[tool.mypy]
python_version = "3.14"
strict = true
ignore_missing_imports = true
plugins = ["pydantic.mypy"]
exclude = ["alembic/"]

[tool.pytest.ini_options]
asyncio_mode = "auto"
# Align fixture loops with the per-test event loop pytest-asyncio creates
# by default. With "session" (the previous setting), async fixtures ran on
# a different loop than the tests themselves, causing asyncpg's loop-bound
# connections to raise "Future attached to a different loop" mid-test.
asyncio_default_fixture_loop_scope = "function"
testpaths = ["tests"]
addopts = "--cov=app --cov-report=term-missing --cov-report=xml"
markers = [
    "integration: tests that require a live PostgreSQL instance (run in CI)",
]

[tool.coverage.run]
omit = ["tests/*", "alembic/*"]
